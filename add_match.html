<!DOCTYPE html>
<html>
<head>
    <title>Add Match</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="profile-container">

    <h1>⚽ Log A Match</h1>

    <input id="opponent" placeholder="Opponent">
    <br><br>

    <input id="competition" placeholder="Competition">
    <br><br>

    <label>Match Date</label>
    <br><br>

    <input id="matchDate" type="date">
    <br><br>

    <input id="minutes" placeholder="Minutes Played" type="number">
    <br><br>

    <input id="goals" placeholder="Goals" type="number">
    <br><br>

    <input id="assists" placeholder="Assists" type="number">
    <br><br>

    <input id="shotsOnTarget" placeholder="Shots On Target" type="number">
    <br><br>

    <input id="shotsOffTarget" placeholder="Shots Off Target" type="number">
    <br><br>

    <input id="oneVOneWon" placeholder="1v1 Won" type="number">
    <br><br>

    <input id="oneVOneLost" placeholder="1v1 Lost" type="number">
    <br><br>

    <textarea
        id="reflection"
        placeholder="How did you play today?"
        rows="5"
        style="width:100%;padding:12px;border-radius:10px;">
    </textarea>

    <br><br>

    <button onclick="saveMatch()">
        Save Match
    </button>

</div>

<script src="script.js"></script>

</body>
</html>

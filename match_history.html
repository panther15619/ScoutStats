<!DOCTYPE html>
<html>
<head>
    <title>Match History</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="profile-container">

    <h1>📖 Football Journal</h1>

    <div id="matchList"></div>

    <br><br>

    <button onclick="window.location.href='dashboard.html'">
        Back To Dashboard
    </button>

</div>

<script>

const matches =
JSON.parse(localStorage.getItem("matches")) || [];

let output = "";

matches
.reverse()
.forEach(match => {

output += `

<div class="card">

<h2>⚽ vs ${match.opponent}</h2>

<p><strong>📅 Date:</strong> ${match.matchDate}</p>

<p><strong>🏆 Competition:</strong> ${match.competition}</p>

<p><strong>⭐ Rating:</strong> ${match.rating}</p>

<p><strong>Goals:</strong> ${match.goals}</p>

<p><strong>Assists:</strong> ${match.assists}</p>

<hr>

<p><strong>📝 Reflection</strong></p>

<p>${match.reflection}</p>

</div>

<br>

`;

});

document.getElementById("matchList").innerHTML = output;

</script>

</body>
</html>

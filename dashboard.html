<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div class="profile-container">
    <br><br>

<h2>📈 Rating Trend</h2>

<canvas id="ratingChart"></canvas>

    <h1>⚽ My Dashboard</h1>

    <div id="stats"></div>

    <br>

    <button onclick="window.location.href='add_match.html'">
        Add Match
    </button>

    <br><br>

    <button onclick="window.location.href='match_history.html'">
        Match History
    </button>

    <br><br>

    <button onclick="window.location.href='my_profile.html'">
        My Profile
    </button>
    <br><br>

<button onclick="window.location.href='comparison.html'">
    📊 Comparison Centre
</button>

</div>

<script>

const matches =
JSON.parse(localStorage.getItem("matches")) || [];

let goals = 0;
let assists = 0;
let totalRating = 0;
let bestRating = 0;

let mostGoalsInMatch = 0;
let mostAssistsInMatch = 0;

matches.forEach(match => {

    goals += Number(match.goals);
    assists += Number(match.assists);

    const rating = Number(match.rating);

    totalRating += rating;

    if (rating > bestRating) {
        bestRating = rating;
    }

    if (Number(match.goals) > mostGoalsInMatch) {
        mostGoalsInMatch = Number(match.goals);
    }

    if (Number(match.assists) > mostAssistsInMatch) {
        mostAssistsInMatch = Number(match.assists);
    }

});

const averageRating =
matches.length > 0
? (totalRating / matches.length).toFixed(1)
: "0.0";

let recentForm = "";

const lastFive =
matches.slice(-5).reverse();

lastFive.forEach(match => {

    recentForm += `
        <span style="
        background:#334155;
        padding:10px;
        border-radius:10px;
        margin:5px;
        display:inline-block;">
            ${match.rating}
        </span>
    `;

});

document.getElementById("stats").innerHTML = `

<h2>Matches Played: ${matches.length}</h2>

<h2>Goals: ${goals}</h2>

<h2>Assists: ${assists}</h2>

<h2>⭐ Average Rating: ${averageRating}</h2>

<h2>🏆 Best Match Rating: ${bestRating}</h2>

<hr>

<h2>📊 Personal Records</h2>

<p>⚽ Most Goals In A Match: ${mostGoalsInMatch}</p>

<p>🎯 Most Assists In A Match: ${mostAssistsInMatch}</p>

<hr>

<h2>🔥 Recent Form</h2>

<div>
${recentForm}
</div>

`;

</script>

</body>
</html>
